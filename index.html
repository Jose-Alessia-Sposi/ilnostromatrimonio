<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Nostro Matrimonio - Jose & Alessia</title>
    <style>
        /* --- STILE GENERALE CON PALETTE AUTUNNALE --- */
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #4e342e; background-color: #fdfdf0; overflow-x: hidden; }
        
        .container { 
            width: 100%; 
            min-height: 100vh; 
            margin: 0; 
            padding: 60px 20px 40px 20px; /* Spazio extra in alto per il bottone menu */
            box-sizing: border-box; 
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .contenuto-centrale {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        /* --- MENU LATERALE A SCOMPARSA (SIDEBAR) --- */
        .sidebar {
            height: 100%; 
            width: 250px; 
            position: fixed; 
            z-index: 2000; /* Sopra a tutto */
            top: 0; 
            left: -250px; /* Nascosto fuori dallo schermo a sinistra */
            background-color: #fdfdf0; /* Sfondo Crema */
            overflow-x: hidden; 
            transition: 0.4s ease; /* Animazione di apertura fluida */
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(78,52,46,0.2);
            border-right: 2px solid #c98a7a;
        }

        .sidebar.aperto { left: 0; } /* Classe che viene aggiunta da JS per aprire */

        .sidebar a {
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 18px; 
            color: #4e342e; 
            display: block; 
            transition: 0.3s;
            font-weight: bold;
        }

        .sidebar a:hover { background-color: #e8dcca; color: #c98a7a; }

        .sidebar .chiudi-btn {
            position: absolute; 
            top: 10px; 
            right: 20px; 
            font-size: 36px; 
            padding: 0;
        }

        /* Testo divisorio nel menu */
        .titolo-menu { padding: 10px 25px; font-size: 14px; color: #c98a7a; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }

        /* --- BOTTONE MENU HAMBURGER --- */
        .menu-btn { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            font-size: 24px; 
            cursor: pointer; 
            background-color: #e8dcca; 
            color: #4e342e; 
            padding: 8px 12px; 
            border-radius: 6px; 
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .menu-btn:hover { background-color: #c98a7a; color: white; }

        /* --- STILE PER LE FOTO (4:3 CONTAIN) --- */
        .foto-slideshow-sopra {
            width: 100%;
            padding-top: 75%; 
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(78,52,46,0.1); 
            background-color: #fdfdf0; 
        }

        .foto-slideshow-sopra div {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: contain; /* Garantisce che la foto non sia MAI tagliata */
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
        }

        h1 { color: #c98a7a; text-align: center; margin-top: 0; font-size: 32px; }
        p { text-align: center; margin-bottom: 20px; color: #5d4037; }

        /* --- STILE FORM E BOTTONI AZIONE --- */
        form { text-align: left; width: 100%; }
        .sezione-form { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.5s; } 
        .sezione-form.attiva { display: flex; } 

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { font-weight: bold; margin-bottom: -5px; color: #4e342e; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; width: 100%; box-sizing: border-box; background-color: #fff; color: #4e342e; }
        
        .bottoni-azione { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        button.btn-submit { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; background-color: #c98a7a; color: white; font-weight: bold; width: 100%; transition: 0.3s; }
        button.btn-submit:hover { background-color: #b07464; }
        button.btn-reset { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; background-color: #e8dcca; color: #4e342e; width: 100%; }
        
        #messaggio-successo { display: none; margin-top: 20px; padding: 15px; background-color: #d8c2b5; color: #5d4037; border-radius: 6px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="apriMenu()">&#9776; Menu</div>

    <div id="mioMenu" class="sidebar">
        <a href="javascript:void(0)" class="chiudi-btn" onclick="chiudiMenu()">&times;</a>
        
        <div class="titolo-menu">Modulo Conferma</div>
        <a href="#" onclick="cambiaScheda('sezione-partecipazione'); chiudiMenu()">Partecipazione</a>
        <a href="#" onclick="cambiaScheda('sezione-adulti'); chiudiMenu()">Adulti</a>
        <a href="#" onclick="cambiaScheda('sezione-bambini'); chiudiMenu()">Bambini</a>
        <a href="#" onclick="cambiaScheda('sezione-allergie'); chiudiMenu()">Allergie</a>
        
        <hr style="border-top: 1px solid #d8c2b5; margin: 15px 20px;">
        
        <div class="titolo-menu">Altre Info</div>
        <a href="location.html">La Location</a>
        <a href="regalo.html">Lista Nozze</a>
    </div>

    <div class="container">
        <div class="contenuto-centrale">
            
            <div class="foto-slideshow-sopra">
                <div style="background-image: url('Foto1.jpeg');"></div>
                <div style="background-image: url('Foto2.jpeg');"></div>
            </div>

            <h1 id="titolo-sezione">Partecipazione</h1>
            <p>Vi preghiamo di confermare la vostra presenza.</p>

            <form id="rsvpForm">
                
                <div id="sezione-partecipazione" class="sezione-form attiva">
                    <label for="nome">Nome e Cognome:</label>
                    <input type="text" id="nome" name="Nome" required placeholder="Es. Mario Rossi">

                    <label for="presenza">Potrete partecipare?</label>
                    <select id="presenza" name="Presenza" required>
                        <option value="" disabled selected>Scegli un'opzione...</option>
                        <option value="Sì">Sì, festeggeremo con voi!</option>
                        <option value="No">No, purtroppo non potremo esserci</option>
                    </select>
                </div>

                <div id="sezione-adulti" class="sezione-form">
                    <label for="adulti">Quanti adulti sarete in totale?</label>
                    <input type="number" id="adulti" name="Adulti" min="1" value="1">
                    <p style="font-size: 12px; color: #666; text-align: left; margin-top: 5px;">Indica il numero totale di adulti (compreso te).</p>
                </div>

                <div id="sezione-bambini" class="sezione-form">
                    <label for="bambini">Quanti bambini (sotto i 12 anni)?</label>
                    <input type="number" id="bambini" name="Numero_Bambini" min="0" value="0">
                </div>

                <div id="sezione-allergie" class="sezione-form">
                    <label for="allergie">Intolleranze o menù speciali:</label>
                    <textarea id="allergie" name="Allergie" rows="3" placeholder="Es. Celiachia, vegano..."></textarea>
                </div>

                <div class="bottoni-azione">
                    <button type="submit" class="btn-submit">Invia Conferma Completa</button>
                    <button type="reset" id="btnClear" class="btn-reset">Svuota modulo</button>
                </div>
                
            </form>

            <div id="messaggio-successo">Grazie! La tua conferma è stata inviata con successo.</div>
        </div>
    </div>

    <script>
        // --- LOGICA MENU A SCOMPARSA ---
        function apriMenu() {
            document.getElementById("mioMenu").classList.add("aperto");
        }

        function chiudiMenu() {
            document.getElementById("mioMenu").classList.remove("aperto");
        }

        // --- LOGICA CAMBIO SEZIONE E TITOLO ---
        function cambiaScheda(idScheda) {
            // Nasconde tutte le sezioni
            document.querySelectorAll('.sezione-form').forEach(sezione => {
                sezione.classList.remove('attiva');
            });
            // Mostra quella selezionata
            document.getElementById(idScheda).classList.add('attiva');
            
            // Cambia il titolo H1 in base alla sezione
            let nuovoTitolo = "";
            if(idScheda === 'sezione-partecipazione') nuovoTitolo = "Partecipazione";
            if(idScheda === 'sezione-adulti') nuovoTitolo = "Dettagli Adulti";
            if(idScheda === 'sezione-bambini') nuovoTitolo = "Dettagli Bambini";
            if(idScheda === 'sezione-allergie') nuovoTitolo = "Allergie e Menù";
            
            document.getElementById('titolo-sezione').innerText = nuovoTitolo;
        }

        // --- LOGICA INVIO GOOGLE FOGLI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx1Vpd07wUeac1QuflbkhRl39eiQv1fEIEZLzeoF_EC1n7F3zNTHhMzRNeZDawbDG3Fow/exec';
        const form = document.getElementById('rsvpForm');
        const messaggioSuccesso = document.getElementById('messaggio-successo');
        const btnSubmit = document.querySelector('.btn-submit');

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            btnSubmit.innerText = 'Invio in corso...';
            btnSubmit.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    messaggioSuccesso.style.display = 'block';
                    form.reset();
                    btnSubmit.innerText = 'Invia Conferma Completa';
                    btnSubmit.disabled = false;
                    // Ritorna alla prima schermata dopo l'invio
                    cambiaScheda('sezione-partecipazione'); 
                })
                .catch(error => {
                    alert("C'è stato un errore, riprova!");
                    btnSubmit.innerText = 'Invia Conferma Completa';
                    btnSubmit.disabled = false;
                });
        });

        // --- LOGICA FOTO SLIDESHOW (CON 'CONTAIN') ---
        window.onload = function() {
            const slides = document.querySelectorAll('.foto-slideshow-sopra div');
            if(slides.length > 0) {
                let currentSlide = 0;
                slides[0].style.opacity = 1;
                
                setInterval(() => {
                    slides[currentSlide].style.opacity = 0;
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].style.opacity = 1;
                }, 5000);
            }
        };
    </script>

</body>
</html>
